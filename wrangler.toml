name = "ai-check"
main = "worker/index.ts"
compatibility_date = "2026-07-11"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "ai-check-db"
database_id = "751c50cc-69fc-49ed-af51-79c6756c90f3"
migrations_dir = "d1/migrations"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "ai-check-reports"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "cc862d3096fc4007b879d624662dcc13"
