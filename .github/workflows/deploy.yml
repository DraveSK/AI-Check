name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Bakes the dashboard to talk to the real hosted API (sign-in,
          # uploaded reports, Settings) instead of demo fixtures — see
          # src/providers/index.tsx and docs/DEPLOYMENT.md.
          VITE_PROVIDER_MODE: cloud-api

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
