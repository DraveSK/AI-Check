name: Provision Cloudflare Infrastructure

# Manual, one-time (or re-run-safe) bootstrap: creates the D1 database, R2
# bucket, and KV namespace this app needs, applies migrations, and commits
# the resulting bindings into wrangler.toml. See docs/DEPLOYMENT.md.
#
# Safe to re-run: every step checks whether the resource already exists
# before creating it, so running this twice does not create duplicates or
# fail.
on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  D1_NAME: ai-check-db
  R2_NAME: ai-check-reports
  KV_TITLE: ai-check-ratelimit
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify Cloudflare credentials
        run: |
          set +e -uo pipefail
          if ! npx wrangler whoami; then
            echo "::error::wrangler whoami failed — CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is missing/invalid."
            echo "See docs/DEPLOYMENT.md §Prerequisites for the exact token permissions needed."
            exit 1
          fi

      - name: Create or find D1 database
        id: d1
        run: |
          set +e -uo pipefail
          LIST_OUTPUT=$(npx wrangler d1 list --json)
          LIST_STATUS=$?
          if [ $LIST_STATUS -ne 0 ]; then
            echo "::error::wrangler d1 list failed. Raw output below — most likely the API token is missing the D1:Edit permission."
            echo "$LIST_OUTPUT"
            echo "See docs/DEPLOYMENT.md §Prerequisites."
            exit 1
          fi
          EXISTING=$(echo "$LIST_OUTPUT" | node -e "
            const list = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            const found = list.find(d => d.name === process.env.D1_NAME);
            console.log(found ? found.uuid : '');
          " 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Found existing D1 database: $EXISTING"
            echo "id=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            OUTPUT=$(npx wrangler d1 create "$D1_NAME")
            CREATE_STATUS=$?
            echo "$OUTPUT"
            if [ $CREATE_STATUS -ne 0 ]; then
              echo "::error::wrangler d1 create failed — see output above."
              exit 1
            fi
            ID=$(echo "$OUTPUT" | grep -oE 'database_id = "[^"]+"' | cut -d'"' -f2)
            if [ -z "$ID" ]; then
              echo "::error::Could not parse database_id from wrangler's output above. wrangler's CLI output format may have changed — add the [[d1_databases]] block to wrangler.toml manually (see docs/DEPLOYMENT.md)."
              exit 1
            fi
            echo "id=$ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or find R2 bucket
        # `wrangler r2 bucket list` doesn't support --json on the pinned
        # wrangler version, and the binding only needs the bucket *name*
        # (no id) — so this just attempts creation and tolerates an
        # already-exists error instead of listing first.
        run: |
          set +e -uo pipefail
          OUTPUT=$(npx wrangler r2 bucket create "$R2_NAME" 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ] && ! echo "$OUTPUT" | grep -qi "already exists"; then
            echo "::error::wrangler r2 bucket create failed — see output above. Most likely the API token is missing the Workers R2 Storage:Edit permission."
            exit 1
          fi

      - name: Create or find KV namespace
        id: kv
        # `wrangler kv namespace list` doesn't support --json on the
        # pinned wrangler version either — attempt creation directly. If
        # a namespace with this title already exists (re-run case),
        # wrangler's own error names it; this step then fails with a
        # pointer to add the binding manually rather than guessing at
        # list-output parsing that can't be verified without a live
        # account (see docs/DEPLOYMENT.md).
        run: |
          set +e -uo pipefail
          OUTPUT=$(npx wrangler kv namespace create "$KV_TITLE" 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -qi "already exists"; then
              echo "::error::A KV namespace named $KV_TITLE already exists. Find its id in the Cloudflare dashboard (Workers & Pages → KV) and add the [[kv_namespaces]] block to wrangler.toml manually — see docs/DEPLOYMENT.md."
            else
              echo "::error::wrangler kv namespace create failed — see output above. Most likely the API token is missing the Workers KV Storage:Edit permission."
            fi
            exit 1
          fi
          ID=$(echo "$OUTPUT" | grep -oE 'id = "[^"]+"' | head -1 | cut -d'"' -f2)
          if [ -z "$ID" ]; then
            echo "::error::Could not parse the namespace id from wrangler's output above. wrangler's CLI output format may have changed — add the [[kv_namespaces]] block to wrangler.toml manually (see docs/DEPLOYMENT.md)."
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Write bindings into wrangler.toml
        env:
          D1_ID: ${{ steps.d1.outputs.id }}
          KV_ID: ${{ steps.kv.outputs.id }}
        run: node scripts/write-bindings.mjs

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply "$D1_NAME" --remote

      - name: Commit wrangler.toml
        run: |
          git config user.name "ai-check-bot"
          git config user.email "actions@users.noreply.github.com"
          git add wrangler.toml
          git diff --cached --quiet || git commit -m "chore: wire Cloudflare D1/R2/KV bindings"
          git push

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ github.token }}
        # Pushes made with the default GITHUB_TOKEN don't cascade into
        # other workflow runs (GitHub's loop-prevention) — the commit
        # above alone would NOT trigger deploy.yml, so this explicitly
        # runs it.
        run: gh workflow run deploy.yml --ref "${{ github.ref_name }}"

      - name: Remind about secrets
        run: |
          echo "Infrastructure provisioned and a deploy has been triggered."
          echo "Remaining manual step (do this once, from your own machine):"
          echo "  wrangler secret put ENCRYPTION_KEY"
          echo "  wrangler secret put RESEND_API_KEY   (optional — magic links log to console without it)"
          echo "See docs/DEPLOYMENT.md."
